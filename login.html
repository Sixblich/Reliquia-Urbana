<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Reliquia Urbana</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      font-family: 'DM Sans', sans-serif;
      background: #0f0f0f;
    }

    /* ── LADO IZQUIERDO (imagen/marca) ── */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2014 50%, #1a1a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .left::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,169,110,0.15) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: #c8a96e;
      letter-spacing: 4px;
      margin-bottom: 16px;
      position: relative;
    }
    .brand-tagline {
      color: #888;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
    }
    .brand-deco {
      width: 60px;
      height: 1px;
      background: #c8a96e;
      margin: 24px auto;
      position: relative;
    }
    .brand-desc {
      color: #666;
      font-size: 13px;
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      position: relative;
    }

    /* ── LADO DERECHO (formulario) ── */
    .right {
      width: 480px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
    }

    .btn-volver-inicio {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #999;
      font-size: 12px;
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.2s, transform 0.15s;
    }
    .btn-volver-inicio:hover { color: #c8a96e; transform: translateX(-2px); }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #111;
      margin-bottom: 6px;
    }
    .form-sub {
      color: #999;
      font-size: 13px;
      margin-bottom: 36px;
    }

    .input-group {
      width: 100%;
      margin-bottom: 18px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .input-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
      color: #111;
    }
    .input-group input:focus {
      outline: none;
      border-color: #c8a96e;
      box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #c8a96e; color: #111; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    .divider {
      width: 100%;
      text-align: center;
      position: relative;
      margin: 24px 0;
      color: #bbb;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-registro {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #111;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
    }
    .link-registro:hover {
      border-color: #c8a96e;
      background: #fdf8f0;
    }
    #linkOlvideContrasena:hover {
      color: #c8a96e;
      text-decoration: underline;
    }

    .divider-o {
      text-align: center; color: #bbb; font-size: 12px;
      margin: 16px 0; position: relative;
    }
    .divider-o::before, .divider-o::after {
      content: ""; position: absolute; top: 50%; width: 42%;
      height: 1px; background: #e5e5e5;
    }
    .divider-o::before { left: 0; }
    .divider-o::after { right: 0; }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px; background: #fff; border: 1.5px solid #ddd; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #333;
      cursor: pointer; transition: 0.2s;
    }
    .btn-google:hover { border-color: #bbb; background: #fafafa; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }

    .mensaje {
      width: 100%;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .mensaje.error   { background: #fff0f0; color: #c00; border: 1px solid #fcc; display: block; }
    .mensaje.success { background: #f0fff4; color: #090; border: 1px solid #9f9; display: block; }
    .mensaje.loading { background: #f5f5f5; color: #555; border: 1px solid #ddd; display: block; }

    @media (max-width: 768px) {
      .left { display: none; }
      .right { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <!-- LADO IZQUIERDO -->
  <div class="left">
    <div class="brand-logo">RELIQUIA URBANA</div>
    <div class="brand-deco"></div>
    <div class="brand-tagline">Moda sostenible</div>
    <div class="brand-desc">
      Compra y vende ropa única. Tu armario, tu mercado. Moda circular con precios justos.
    </div>
  </div>

  <!-- LADO DERECHO -->
  <div class="right">
    <a href="index.html" class="btn-volver-inicio">← Volver al inicio</a>
    <h1 class="form-title">Bienvenido de vuelta</h1>
    <p class="form-sub">Ingresa a tu cuenta para continuar</p>

    <form id="loginForm" style="width:100%">
      <div class="input-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
      </div>
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password">
      </div>
      <a href="#" id="linkOlvideContrasena" style="display:block; text-align:right; font-size:12.5px; color:#999; text-decoration:none; margin:-8px 0 14px;">¿Olvidaste tu contraseña?</a>
      <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
    </form>

    <div class="divider-o">o</div>
    <button type="button" id="btnGoogle" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.8 2.73v2.27h2.91c1.7-1.57 2.69-3.88 2.69-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.27c-.81.54-1.84.86-3.05.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.34C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.95 10.69c-.18-.54-.28-1.11-.28-1.69s.1-1.15.28-1.69V4.97H.96C.35 6.19 0 7.55 0 9s.35 2.81.96 4.03l2.99-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.97l2.99 2.34C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      <span>Continuar con Google</span>
    </button>

    <div class="mensaje" id="mensaje"></div>

    <div class="divider">¿No tienes cuenta?</div>
    <a href="registro.html" class="link-registro">Crear cuenta nueva</a>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup, fetchSignInMethodsForEmail, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const form    = document.getElementById("loginForm");
    const msg     = document.getElementById("mensaje");
    const btnLogin = document.getElementById("btnLogin");

    // ── RECUPERAR CONTRASEÑA ──────────────────────────────────────────────────
    document.getElementById("linkOlvideContrasena").addEventListener("click", async function(e) {
      e.preventDefault();

      var emailActual = document.getElementById("email").value.trim();
      var email = await pedirValor("Ingresa tu correo electronico para recibir el enlace de recuperacion:", emailActual);

      if (!email) return; // el usuario cancelo

      if (!email.includes("@") || !email.includes(".")) {
        mostrarAviso("Ingresa un correo electronico valido.", "error");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        mostrarAviso("Te enviamos un correo a " + email + " con el enlace para restablecer tu contraseña. Revisa tu bandeja de entrada (y spam).", "success");
      } catch (error) {
        if (error.code === "auth/user-not-found") {
          mostrarAviso("No existe ninguna cuenta registrada con ese correo.", "error");
        } else if (error.code === "auth/invalid-email") {
          mostrarAviso("El correo ingresado no es valido.", "error");
        } else {
          mostrarAviso("Error al enviar el correo de recuperacion: " + error.message, "error");
        }
      }
    });

    // ── INICIAR SESION CON GOOGLE ────────────────────────────────────────────
    document.getElementById("btnGoogle").addEventListener("click", async function() {
      var btnG = document.getElementById("btnGoogle");
      btnG.disabled = true;

      try {
        var provider = new GoogleAuthProvider();
        var result = await signInWithPopup(auth, provider);
        var user = result.user;

        // El login con Google solo debe dejar entrar a cuentas YA registradas
        var refUsuario = doc(db, "usuarios", user.uid);
        var snap = await getDoc(refUsuario);

        if (!snap.exists()) {
          // Cuenta nueva: no crear nada, cerrar sesion y mandar a registrarse
          await cerrarSesionSinRedirigir();
          mostrarAviso("No tienes una cuenta registrada todavia. Te llevamos a crear una con Google.", "info");
          setTimeout(function() {
            window.location.href = "registro.html?google=1";
          }, 1800);
          return;
        }

        await redirigirSegunRol(user.uid);

      } catch (error) {
        btnG.disabled = false;
        if (error.code === "auth/popup-closed-by-user") {
          return;
        }
        mostrarAviso("Error al iniciar sesion con Google: " + error.message, "error");
      }
    });

    // Si ya hay sesión activa, redirigir según rol
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await redirigirSegunRol(user.uid);
      }
    });

    function mostrarMsg(texto, tipo) {
      msg.textContent = texto;
      msg.className = "mensaje " + tipo;
    }

    async function cerrarSesionSinRedirigir() {
      try { await signOut(auth); } catch (e) { /* ignorar */ }
    }

    async function redirigirSegunRol(uid) {
      // Si venía de una página específica (carrito, vender, etc.), regresar ahí
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get("redirect");

      try {
        const snap = await getDoc(doc(db, "usuarios", uid));
        if (snap.exists()) {
          const rol = snap.data().rol;
          if (rol === "admin") {
            window.location.href = "admin.html";
          } else if (redirect && redirect !== "login.html") {
            window.location.href = redirect;
          } else {
            window.location.href = "catalogo.html";
          }
        } else {
          window.location.href = "catalogo.html";
        }
      } catch(e) {
        window.location.href = "catalogo.html";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      btnLogin.disabled = true;
      btnLogin.textContent = "Ingresando...";
      mostrarMsg("Verificando credenciales...", "loading");

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        mostrarMsg("¡Bienvenido! Redirigiendo...", "success");
        await redirigirSegunRol(cred.user.uid);

      } catch (error) {
        btnLogin.disabled = false;
        btnLogin.textContent = "Iniciar Sesión";

        // Si el error es de credenciales, revisar si la cuenta fue creada con Google
        if (error.code === "auth/wrong-password" || error.code === "auth/invalid-credential" || error.code === "auth/user-not-found") {
          try {
            const metodos = await fetchSignInMethodsForEmail(auth, email);
            if (metodos.includes("google.com") && !metodos.includes("password")) {
              mostrarMsg("Esta cuenta fue creada con Google. Usa el botón \"Continuar con Google\" de abajo para iniciar sesión, o crea una contraseña desde \"¿Olvidaste tu contraseña?\".", "error");
              return;
            }
          } catch (e2) { /* si falla la verificacion, seguimos con el mensaje generico */ }
        }

        const errores = {
          "auth/user-not-found"     : "No existe una cuenta con ese correo.",
          "auth/wrong-password"     : "Contraseña incorrecta.",
          "auth/invalid-email"      : "El formato del correo no es válido.",
          "auth/invalid-credential" : "Correo o contraseña incorrectos. Si creaste tu cuenta con Google, usa ese botón en su lugar.",
          "auth/too-many-requests"  : "Demasiados intentos. Intenta más tarde.",
          "auth/user-disabled"      : "Esta cuenta ha sido desactivada.",
        };
        mostrarMsg(errores[error.code] || "Error al iniciar sesión. Intenta nuevamente.", "error");
      }
    });
  </script>
<script src="ui-notify.js"></script>
</body>
</html>
