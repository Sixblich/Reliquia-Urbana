<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Reliquia Urbana</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      font-family: 'DM Sans', sans-serif;
      background: #0f0f0f;
    }

    /* ── LADO IZQUIERDO (imagen/marca) ── */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2014 50%, #1a1a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .left::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,169,110,0.15) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: #c8a96e;
      letter-spacing: 4px;
      margin-bottom: 16px;
      position: relative;
    }
    .brand-tagline {
      color: #888;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
    }
    .brand-deco {
      width: 60px;
      height: 1px;
      background: #c8a96e;
      margin: 24px auto;
      position: relative;
    }
    .brand-desc {
      color: #666;
      font-size: 13px;
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      position: relative;
    }

    /* ── LADO DERECHO (formulario) ── */
    .right {
      width: 480px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #111;
      margin-bottom: 6px;
    }
    .form-sub {
      color: #999;
      font-size: 13px;
      margin-bottom: 36px;
    }

    .input-group {
      width: 100%;
      margin-bottom: 18px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .input-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
      color: #111;
    }
    .input-group input:focus {
      outline: none;
      border-color: #c8a96e;
      box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #c8a96e; color: #111; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    .divider {
      width: 100%;
      text-align: center;
      position: relative;
      margin: 24px 0;
      color: #bbb;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-registro {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #111;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
    }
    .link-registro:hover {
      border-color: #c8a96e;
      background: #fdf8f0;
    }

    .mensaje {
      width: 100%;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .mensaje.error   { background: #fff0f0; color: #c00; border: 1px solid #fcc; display: block; }
    .mensaje.success { background: #f0fff4; color: #090; border: 1px solid #9f9; display: block; }
    .mensaje.loading { background: #f5f5f5; color: #555; border: 1px solid #ddd; display: block; }

    @media (max-width: 768px) {
      .left { display: none; }
      .right { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <!-- LADO IZQUIERDO -->
  <div class="left">
    <div class="brand-logo">RELIQUIA URBANA</div>
    <div class="brand-deco"></div>
    <div class="brand-tagline">Moda sostenible</div>
    <div class="brand-desc">
      Compra y vende ropa única. Tu armario, tu mercado. Moda circular con precios justos.
    </div>
  </div>

  <!-- LADO DERECHO -->
  <div class="right">
    <h1 class="form-title">Bienvenido de vuelta</h1>
    <p class="form-sub">Ingresa a tu cuenta para continuar</p>

    <form id="loginForm" style="width:100%">
      <div class="input-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
      </div>
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
    </form>

    <div class="mensaje" id="mensaje"></div>

    <div class="divider">¿No tienes cuenta?</div>
    <a href="registro.html" class="link-registro">Crear cuenta nueva</a>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const form    = document.getElementById("loginForm");
    const msg     = document.getElementById("mensaje");
    const btnLogin = document.getElementById("btnLogin");

    // Si ya hay sesión activa, redirigir según rol
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await redirigirSegunRol(user.uid);
      }
    });

    function mostrarMsg(texto, tipo) {
      msg.textContent = texto;
      msg.className = "mensaje " + tipo;
    }

    async function redirigirSegunRol(uid) {
      try {
        const snap = await getDoc(doc(db, "usuarios", uid));
        if (snap.exists()) {
          const rol = snap.data().rol;
          if (rol === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "catalogo.html";
          }
        } else {
          window.location.href = "catalogo.html";
        }
      } catch(e) {
        window.location.href = "catalogo.html";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      btnLogin.disabled = true;
      btnLogin.textContent = "Ingresando...";
      mostrarMsg("Verificando credenciales...", "loading");

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        mostrarMsg("¡Bienvenido! Redirigiendo...", "success");
        await redirigirSegunRol(cred.user.uid);

      } catch (error) {
        btnLogin.disabled = false;
        btnLogin.textContent = "Iniciar Sesión";

        const errores = {
          "auth/user-not-found"     : "No existe una cuenta con ese correo.",
          "auth/wrong-password"     : "Contraseña incorrecta.",
          "auth/invalid-email"      : "El formato del correo no es válido.",
          "auth/invalid-credential" : "Correo o contraseña incorrectos.",
          "auth/too-many-requests"  : "Demasiados intentos. Intenta más tarde.",
          "auth/user-disabled"      : "Esta cuenta ha sido desactivada.",
        };
        mostrarMsg(errores[error.code] || "Error al iniciar sesión. Intenta nuevamente.", "error");
      }
    });
  </script>
</body>
</html>
