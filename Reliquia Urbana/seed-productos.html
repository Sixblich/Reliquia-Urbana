<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cargar productos de prueba</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
    button { padding: 16px 40px; background: #c8a96e; color: #111; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
    button:hover { background: #a07c3f; }
    #log { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; width: 500px; max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.8; }
    .ok  { color: #70AD47; }
    .err { color: #FF4444; }
  </style>
</head>
<body>

  <h2>🌱 Cargar productos de prueba a Firestore</h2>
  <p style="color:#999; font-size:13px;">Solo ejecuta esto UNA vez para tener datos en Firebase</p>
  <button onclick="cargarProductos()">Cargar productos ahora</button>
  <div id="log"></div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productos = [
  { nombre: "Vestido floral midi",     precio: 24.99, precioAnterior: 65,  categoria: "vestidos",    talla: "M",  estado: "usado",  stock: 3,  descripcion: "Hermoso vestido floral midi de temporada, tela suave y fresca. Perfecto para el verano.",  imagen: "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400&q=80", marca: "Zara",      activo: true },
  { nombre: "Abrigo beige oversize",   precio: 38.00, precioAnterior: 0,   categoria: "abrigos",     talla: "L",  estado: "nuevo",  stock: 5,  descripcion: "Abrigo oversize color beige, tendencia actual. Confeccionado en mezcla de lana premium.",    imagen: "https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=400&q=80", marca: "H&M",       activo: true },
  { nombre: "Air Force 1 blancas",     precio: 55.00, precioAnterior: 110, categoria: "zapatos",     talla: "42", estado: "usado",  stock: 1,  descripcion: "Clásicas Nike Air Force 1 en color blanco. En excelente estado, solo usadas 3 veces.",       imagen: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80", marca: "Nike",      activo: true },
  { nombre: "Bolso cuero negro",        precio: 42.00, precioAnterior: 95,  categoria: "accesorios",  talla: "U",  estado: "nuevo",  stock: 4,  descripcion: "Bolso elegante en cuero genuino color negro. Incluye correa ajustable y múltiples bolsillos.", imagen: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&q=80", marca: "Guess",     activo: true },
  { nombre: "Camiseta vintage 90s",     precio: 12.00, precioAnterior: 0,   categoria: "camisetas",   talla: "S",  estado: "usado",  stock: 8,  descripcion: "Camiseta con estampado vintage de los años 90. Algodón 100%, muy cómoda y única.",            imagen: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&q=80", marca: "Levi's",    activo: true },
  { nombre: "Jeans wide leg azul",      precio: 18.50, precioAnterior: 40,  categoria: "pantalones",  talla: "M",  estado: "usado",  stock: 2,  descripcion: "Jeans de corte wide leg color azul clásico. Tendencia actual, cintura alta y muy cómodos.",   imagen: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400&q=80", marca: "Pull&Bear", activo: true },
  { nombre: "Tacones negros stiletto",  precio: 34.00, precioAnterior: 80,  categoria: "zapatos",     talla: "38", estado: "nuevo",  stock: 3,  descripcion: "Elegantes tacones stiletto en color negro. Perfectos para eventos formales y salidas nocturnas.", imagen: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=400&q=80", marca: "Zara",      activo: true },
  { nombre: "Chaqueta de cuero marrón",precio: 65.00, precioAnterior: 120, categoria: "abrigos",     talla: "L",  estado: "usado",  stock: 1,  descripcion: "Chaqueta clásica de cuero marrón oscuro. Estilo rockero atemporal, en perfecto estado.",      imagen: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&q=80", marca: "Zara",      activo: true },
  { nombre: "Vestido negro de noche",   precio: 45.00, precioAnterior: 90,  categoria: "vestidos",    talla: "S",  estado: "nuevo",  stock: 2,  descripcion: "Vestido negro elegante para ocasiones especiales. Tela de alta calidad con detalles en encaje.", imagen: "https://images.unsplash.com/photo-1566479179817-c48fc12c6b8a?w=400&q=80", marca: "Mango",     activo: true },
  { nombre: "Gorra negra snapback",     precio: 8.00,  precioAnterior: 20,  categoria: "accesorios",  talla: "U",  estado: "usado",  stock: 6,  descripcion: "Gorra snapback en color negro con logo bordado. Ajustable, talla única.",                      imagen: "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=400&q=80", marca: "Nike",      activo: true },
];

window.cargarProductos = async function() {
  const log = document.getElementById("log");
  log.innerHTML = "<span style='color:#c8a96e'>Cargando productos...</span><br>";

  for (const p of productos) {
    try {
      await addDoc(collection(db, "productos"), {
        ...p,
        creadoEn: serverTimestamp()
      });
      log.innerHTML += `<span class='ok'>✅ "${p.nombre}" agregado</span><br>`;
    } catch(e) {
      log.innerHTML += `<span class='err'>❌ Error en "${p.nombre}": ${e.message}</span><br>`;
    }
  }

  log.innerHTML += "<br><span style='color:#c8a96e;font-weight:bold'>✅ ¡Listo! Ahora abre catalogo.html</span>";
  log.scrollTop = log.scrollHeight;
}
</script>

</body>
</html>
